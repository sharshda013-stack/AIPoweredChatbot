<!DOCTYPE html>
<html>
<head>
    <title>AI Powered Chatbot</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f4f4f4;
            text-align:center;
            margin-top:100px;
        }

        .container{
            width:400px;
            margin:auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px gray;
        }

        input{
            width:70%;
            padding:10px;
        }

        button{
            padding:10px 20px;
            background:#007bff;
            color:white;
            border:none;
            border-radius:5px;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>🤖 AI Powered Chatbot</h1>

    <form action="/chat" method="POST">
        <input type="text" name="message" placeholder="Type your message..." required>
        <button type="submit">Send</button>
    </form>
</div>

</body>
</html>
